# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.

# Site settings
title: MM
email: 
description: >- 
  基桑886
twitter_username: tim jack
github_username: jisang886

# Theme settings
minimal_mistakes_skin: "default"   # 可选：default, air, contrast, dark, mint, sunrise, aqua 等
search: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.28.0"   # 使用最新稳定版本

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Shanghai   # 中国用户推荐设置为这个

include:
  - _pages

# Plugins
plugins:
  - jekyll-include-cache     # 远程主题必须的插件
  # 其他插件暂时注释掉，避免和 github-pages gem 冲突
  # - jekyll-paginate
  # - jekyll-sitemap
  # - jekyll-gist
  # - jekyll-feed
  # - jemoji

author:
  name: "ANNO"
  avatar: "/assets/images/TX.jpeg"   # 请把你的头像放到 assets/images/ 文件夹
  bio: "二次元臭死宅"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jisang886"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/你的账号"
    # 可以继续添加其他链接

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jisang886"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/你的账号"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Archive settings
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/